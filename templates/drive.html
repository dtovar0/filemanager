{% extends "base.html" %}

{% block title %}Nexus Drive - Explorador Premium{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/drive.css') }}?v=15">
<style nonce="{{ csp_nonce() }}">
    /* Estilos estructurales críticos recuperados */
<link rel="stylesheet" href="{{ url_for('static', filename='css/drive.css') }}?v=18">
{% endblock %}

{% block sidebar %}
<aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
        <div class="logo-icon logo-icon--dynamic">
            {% if portal_settings and portal_settings.portal_logo_url %}
                <img src="{{ portal_settings.portal_logo_url }}" class="global-logo-img">
            {% else %}
                <i class="fas {{ portal_settings.portal_icon or 'fa-box' }} logo-icon__i--dynamic"></i>
            {% endif %}
        </div>
        <div class="line-height-11">
            <span class="fw-700 d-block global-brand-text">{{ portal_settings.portal_name or 'Nexus Drive' }}</span>
        </div>
    </div>

    <div class="sidebar-section-label"><span class="label-text">Inicio</span></div>
    <nav class="sidebar-nav">
        <div class="nav-item catalog-tab-item active" data-tab="inicio">
            <i class="fas fa-home nav-item-icon"></i>
            <span>Dashboard</span>
        </div>
    </nav>

    <div class="sidebar-section-label"><span class="label-text">Exploración</span></div>
    <nav class="sidebar-nav">
        <div class="nav-item catalog-tab-item" data-tab="archivos" id="nav-files-root">
            <i class="fas fa-folder-open nav-item-icon"></i>
            <span>Todos los Archivos</span>
        </div>
        
        {% if approved_platforms %}
            <div class="sidebar-section-label sidebar-section-label--flat"><span class="label-text">Plataformas</span></div>
            {% for plat in approved_platforms %}
            <div class="nav-item catalog-tab-item plat-nav-item" 
                 data-tab="archivos" 
                 data-area-name="{{ plat.name }}">
                <i class="fas {{ plat.icon or 'fa-layer-group' }} nav-item-icon"></i>
                <span>{{ plat.name }}</span>
            </div>
            {% endfor %}
        {% endif %}
    </nav>

    <div class="flex-1"></div>
    
    <div class="user-widget">
        <div class="user-profile-trigger">
            <div class="avatar">{% if current_user %}{{ current_user.name[:2].upper() }}{% else %}AD{% endif %}</div>
            <div class="user-info">
                <span class="user-name">{% if current_user %}{{ current_user.name }}{% else %}Admin{% endif %}</span>
                <span class="user-role">{% if current_user %}{{ current_user.role }}{% else %}Administrator{% endif %}</span>
            </div>
        </div>
    </div>
</aside>
{% endblock %}

{% block top_left %}
    <div id="unified-navigator" class="nav-bar--unified">
        <button class="btn btn-ghost" id="back-nav-btn" disabled>
            <i class="fas fa-arrow-left"></i>
        </button>
        <div id="catalog-breadcrumb" class="breadcrumb--dynamic">
            <!-- Breadcrumbs dinámicos -->
        </div>
    </div>
{% endblock %}

{% block top_bar_right %}
    <div class="top-bar__actions">
        <div class="dashboard-controls">
            <button class="btn btn-ghost grid-btn active" data-view="grid"><i class="fas fa-th-large"></i></button>
            <button class="btn btn-ghost grid-btn" data-view="list"><i class="fas fa-list"></i></button>
        </div>
        <div class="top-bar__divider"></div>
        <button class="theme-toggle-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
    </div>
{% endblock %}

{% block content %}
<script nonce="{{ csp_nonce() }}">
    window.NEXUS_PLATFORMS = {{ platforms_json|tojson|safe }};
    window.PORTAL_THEME = {
        logoBg: '{{ portal_settings.portal_logo_bg or "#6366f1" }}',
        iconColor: '{{ portal_settings.portal_icon_color or "#ffffff" }}'
    };
</script>

<div id="catalog-root" class="catalog-container">
    
    <!-- VISTA 1: DASHBOARD -->
    <div id="view-inicio" class="catalog-view animate-fade-in p-2">
        <div class="dashboard-layout">
            
            <!-- Columna de Gráficas -->
            <div class="dashboard-layout__primary">
                
                <!-- KPIs -->
                <div class="kpi-grid">
                    {% for label, id, icon, color_cls in [
                        ('Áreas', 'kpi-areas', 'fa-sitemap', 'emerald'),
                        ('Plataformas', 'kpi-platforms', 'fa-layer-group', 'indigo'),
                        ('Descargas', 'kpi-downloads', 'fa-download', 'amber'),
                        ('Subidas', 'kpi-uploads', 'fa-upload', 'sky')
                    ] %}
                    <div class="nexus-action-card kpi-grid__item--luxury">
                        <div class="kpi-icon-box kpi-icon-box--{{ color_cls }}">
                            <i class="fas {{ icon }}"></i>
                        </div>
                        <div class="kpi-info-box">
                            <span class="kpi-label--nano">{{ label }}</span>
                            <div id="{{ id }}" class="kpi-value--xl">0</div>
                        </div>
                    </div>
                    {% endfor %}
                </div>

                <!-- Gráficas Core -->
                <div class="charts-row">
                    <div class="nexus-action-card charts-row__item">
                        <h4 class="chart-label--micro">Actividad de Descargas</h4>
                        <div class="chart-canvas-wrapper">
                            <canvas id="downloadChart"></canvas>
                        </div>
                    </div>
                    <div class="nexus-action-card charts-row__item">
                        <h4 class="chart-label--micro">Actividad de Subidas</h4>
                        <div class="chart-canvas-wrapper">
                            <canvas id="uploadChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Columna de Auditoría -->
            <div class="dashboard-layout__secondary">
                <div class="nexus-action-card h-full">
                    <h4 class="monitor-label--header">Monitor de Sistema</h4>
                    <div id="activity-log-monitor" class="monitor-list">
                        <!-- Logs dinámicos -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- VISTA 2: EXPLORADOR -->
    <div id="view-archivos" class="catalog-view d-none">
        
        <div id="area-selector-screen" class="area-selector-pane animate-fade-in">
            <h2 class="pane-title--xl">Explorar Áreas</h2>
            <div class="nexus-area-grid">
                {% for area in approved_areas %}
                <div class="nexus-area-card" data-action="open-area" data-area-name="{{ area.name }}">
                    <div class="area-card__icon-box">
                        <i class="fas {{ area.icon or 'fa-folder' }}"></i>
                    </div>
                    <h4 class="area-card__title">{{ area.name }}</h4>
                    <p class="area-card__desc">Acceso a recursos de {{ area.name }}.</p>
                </div>
                {% endfor %}
            </div>
        </div>

        <div id="archivos-grid" class="d-none nexus-explorer-layout">
            <div id="explorer-container" class="explorer-main-area"></div>

            <div class="nexus-management-sidebar">
                <div class="nexus-action-card">
                    <h5 class="management-label--mini">Acciones rápidas</h5>
                    <div class="search-wrapper--nexus">
                        <i class="fas fa-search search-wrapper__icon"></i>
                        <input type="text" id="file-search" class="nexus-search-input--premium" placeholder="Buscar...">
                    </div>
                    <div class="action-buttons-row">
                        <button class="btn btn-primary--brand" id="trigger-upload"><i class="fas fa-cloud-upload-alt"></i> Subir</button>
                        <button class="btn btn-ghost--brand" id="open-folder-modal"><i class="fas fa-folder-plus"></i> Nueva</button>
                    </div>
                </div>

                <div class="nexus-action-card nexus-action-card--preview">
                    <h5 class="management-label--mini">Vista Previa</h5>
                    
                    <div id="details-empty" class="preview-empty-state">
                        <i class="fas fa-fingerprint preview-empty-state__icon"></i>
                        <h4 class="preview-empty-state__title">Sin Selección</h4>
                    </div>

                    <div id="details-content" class="preview-active-content d-none">
                        <div id="detail-preview-container" class="preview-nexus-box--luxury">
                            <i class="fas fa-file-alt" id="detail-icon-large"></i>
                        </div>
                        <h3 id="detail-name" class="preview-item-name">Nombre</h3>
                        <div class="preview-meta-grid">
                            <div class="meta-row"><span>Tamaño</span><span id="detail-size">--</span></div>
                            <div class="meta-row"><span>Fecha</span><span id="detail-date">--</span></div>
                        </div>
                        <div class="preview-actions-footer">
                            <button class="btn btn-success--premium" id="btn-download-main">Descargar</button>
                            <button class="btn btn-danger--premium" id="btn-delete-main">Borrar</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal -->
<div id="newFolderModal" class="modal-overlay d-none">
    <div class="nexus-action-card modal-content--center animate-fade-in">
        <h3 class="modal-title--large">Nueva Carpeta</h3>
        <input type="text" id="newFolderName" class="nexus-search-input--premium" placeholder="Nombre...">
        <div class="modal-buttons-row">
            <button class="btn btn-ghost--brand" onclick="document.getElementById('newFolderModal').classList.add('d-none')">Cancelar</button>
            <button id="confirm-new-folder" class="btn btn-primary--brand">Crear</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js" nonce="{{ csp_nonce() }}"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" nonce="{{ csp_nonce() }}"></script>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/drive.js') }}?v=18" nonce="{{ csp_nonce() }}"></script>
{% endblock %}
